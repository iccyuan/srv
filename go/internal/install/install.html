<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>srv installer</title>
<style>
  :root {
    --bg: #101114;
    --surface: #181a1f;
    --surface-2: #20232a;
    --border: #323741;
    --border-strong: #46505f;
    --text: #edf0f5;
    --muted: #98a2b3;
    --subtle: #c3cad5;
    --ok: #38d996;
    --warn: #f4c95d;
    --bad: #ff6b6b;
    --accent: #6ee7b7;
    --accent-text: #06120d;
    --shadow: rgba(0, 0, 0, 0.28);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    color: var(--text);
    background:
      linear-gradient(180deg, rgba(110, 231, 183, 0.08), transparent 260px),
      var(--bg);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }

  .app {
    width: min(1080px, calc(100vw - 32px));
    margin: 0 auto;
    padding: 28px 0 24px;
  }

  .topbar {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 18px;
    margin-bottom: 18px;
  }

  h1 {
    margin: 0;
    font-size: 28px;
    line-height: 1.1;
    font-weight: 700;
    letter-spacing: 0;
  }

  .subtitle {
    margin-top: 7px;
    color: var(--muted);
    font-size: 13px;
  }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-height: 34px;
    padding: 6px 11px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: rgba(24, 26, 31, 0.84);
    color: var(--subtle);
    white-space: nowrap;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
  }

  .dot.ok { background: var(--ok); }
  .dot.warn { background: var(--warn); }
  .dot.bad { background: var(--bad); }

  .grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(360px, 0.9fr);
    gap: 16px;
    align-items: start;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 18px 44px var(--shadow);
    overflow: hidden;
  }

  .panel-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.02);
  }

  .panel-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--subtle);
  }

  .panel-note {
    color: var(--muted);
    font-size: 12px;
    text-align: right;
  }

  .summary {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    padding: 14px;
  }

  .metric {
    min-width: 0;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface-2);
  }

  .metric-label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 8px;
  }

  .metric-value {
    min-height: 22px;
    color: var(--text);
    font-weight: 650;
    overflow-wrap: anywhere;
  }

  .metric-detail {
    margin-top: 4px;
    color: var(--muted);
    font-size: 12px;
    overflow-wrap: anywhere;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    min-height: 22px;
    padding: 2px 8px;
    border-radius: 999px;
    border: 1px solid var(--border-strong);
    color: var(--subtle);
    background: rgba(255, 255, 255, 0.03);
    font-size: 12px;
    font-weight: 650;
  }

  .badge.ok { color: var(--ok); border-color: rgba(56, 217, 150, 0.42); }
  .badge.warn { color: var(--warn); border-color: rgba(244, 201, 93, 0.42); }
  .badge.bad { color: var(--bad); border-color: rgba(255, 107, 107, 0.42); }

  .actions {
    padding: 8px;
  }

  .action {
    display: grid;
    grid-template-columns: 22px minmax(0, 1fr);
    gap: 12px;
    padding: 12px;
    border: 1px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    user-select: none;
  }

  .action + .action { margin-top: 4px; }

  .action:hover:not(.disabled) {
    background: rgba(255, 255, 255, 0.035);
    border-color: var(--border);
  }

  .action.selected {
    border-color: rgba(110, 231, 183, 0.5);
    background: rgba(110, 231, 183, 0.08);
  }

  .action.disabled {
    opacity: 0.48;
    cursor: not-allowed;
  }

  .action input {
    width: 18px;
    height: 18px;
    margin: 2px 0 0;
    accent-color: var(--accent);
  }

  .action-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    color: var(--text);
    font-weight: 650;
  }

  .action-desc {
    margin-top: 3px;
    color: var(--muted);
    font-size: 12px;
  }

  .action-tag {
    flex: 0 0 auto;
    color: var(--muted);
    font-size: 11px;
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 1px 7px;
  }

  .toolbar {
    display: flex;
    gap: 10px;
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.02);
  }

  button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: 38px;
    border: 1px solid transparent;
    border-radius: 8px;
    padding: 9px 14px;
    font: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }

  button.primary {
    background: var(--accent);
    color: var(--accent-text);
  }

  button.secondary {
    background: var(--surface-2);
    color: var(--text);
    border-color: var(--border);
  }

  button:hover:not(:disabled) { filter: brightness(1.06); }
  button:disabled { opacity: 0.48; cursor: not-allowed; }

  .log-panel {
    margin-top: 16px;
  }

  .log {
    min-height: 220px;
    max-height: 300px;
    overflow: auto;
    padding: 14px 16px;
    color: #d8dee9;
    background: #090b0f;
    font: 12px/1.55 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    white-space: pre-wrap;
  }

  .log:empty::before {
    content: "No actions applied yet.";
    color: #697386;
  }

  .footer {
    margin-top: 14px;
    color: var(--muted);
    font-size: 12px;
    text-align: center;
  }

  .done {
    width: min(520px, calc(100vw - 32px));
    margin: 90px auto;
    padding: 28px;
    text-align: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  .done h1 { font-size: 24px; }
  .done p { margin: 8px 0 0; color: var(--muted); }

  @media (max-width: 860px) {
    .topbar { align-items: flex-start; flex-direction: column; }
    .grid { grid-template-columns: 1fr; }
    .summary { grid-template-columns: 1fr; }
    .toolbar { flex-direction: column; }
    button { width: 100%; }
  }
</style>
</head>
<body>
<main class="app">
  <header class="topbar">
    <div>
      <h1>srv installer</h1>
      <div class="subtitle" id="subtitle">Loading status...</div>
    </div>
    <div class="status-pill" id="overall"><span class="dot warn"></span><span>Checking installation</span></div>
  </header>

  <section class="grid">
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">System status</div>
        <div class="panel-note">Current machine</div>
      </div>
      <div class="summary" id="status"></div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">Install actions</div>
        <div class="panel-note" id="selected-count">0 selected</div>
      </div>
      <div class="actions" id="actions"></div>
      <div class="toolbar">
        <button id="apply" class="primary" type="button">Apply selected</button>
        <button id="refresh" class="secondary" type="button">Refresh</button>
        <button id="quit" class="secondary" type="button">Done</button>
      </div>
    </div>
  </section>

  <section class="panel log-panel">
    <div class="panel-head">
      <div class="panel-title">Output</div>
      <div class="panel-note">Installer activity</div>
    </div>
    <div class="log" id="log"></div>
  </section>

  <div class="footer">srv installer - close this tab when finished</div>
</main>

<script>
const $ = (sel) => document.querySelector(sel);

function el(tag, className, text) {
  const node = document.createElement(tag);
  if (className) node.className = className;
  if (text !== undefined) node.textContent = text;
  return node;
}

function badge(kind, text) {
  const node = el('span', `badge ${kind || ''}`.trim());
  const dot = el('span', `dot ${kind || ''}`.trim());
  node.append(dot, document.createTextNode(text));
  return node;
}

function statusKind(ok, warn) {
  if (ok) return 'ok';
  if (warn) return 'warn';
  return 'bad';
}

function setOverall(kind, text) {
  const node = $('#overall');
  node.replaceChildren(badge(kind, text));
}

function metric(label, value, detail, kind, badgeText) {
  const card = el('div', 'metric');
  const head = el('div', 'metric-label');
  head.append(el('span', '', label), badge(kind, badgeText));
  card.append(head, el('div', 'metric-value', value || '-'));
  if (detail) card.append(el('div', 'metric-detail', detail));
  return card;
}

function platformName(p) {
  if (p === 'windows') return 'Windows';
  if (p === 'darwin') return 'macOS';
  if (p === 'linux') return 'Linux';
  return p || 'unknown';
}

function pathDesc(s) {
  if (s.platform === 'windows') {
    return 'Adds the binary directory to your User PATH. Open a new terminal after applying.';
  }
  return 'On macOS/Linux: symlink to ~/.local/bin when available, otherwise update the shell rc file.';
}

function buildActions(s) {
  return [
    {
      key: 'add_to_path',
      group: 'path',
      label: 'Add to PATH',
      tag: 'PATH',
      desc: pathDesc(s),
      checked: !s.path.on_path,
      disabled: false,
    },
    {
      key: 'remove_from_path',
      group: 'path',
      label: 'Remove from PATH',
      tag: 'PATH',
      desc: 'Undo a previous PATH install for this binary directory.',
      checked: false,
      disabled: !s.path.on_path,
    },
    {
      key: 'register_claude_mcp',
      group: 'claude',
      label: 'Register Claude Code MCP',
      tag: 'Claude',
      desc: s.claude_mcp.available
        ? 'Adds srv under Claude Code user scope so mcp__srv__* tools are available in new sessions.'
        : 'Claude CLI was not detected on PATH.',
      checked: s.claude_mcp.available && !s.claude_mcp.registered,
      disabled: !s.claude_mcp.available,
    },
    {
      key: 'unregister_claude_mcp',
      group: 'claude',
      label: 'Unregister Claude Code MCP',
      tag: 'Claude',
      desc: 'Remove srv from Claude Code MCP servers.',
      checked: false,
      disabled: !s.claude_mcp.available || !s.claude_mcp.registered,
    },
    {
      key: 'register_codex_mcp',
      group: 'codex',
      label: 'Register Codex MCP',
      tag: 'Codex',
      desc: `Adds srv to ${s.codex_mcp.config_path || 'Codex config'} for new Codex sessions.`,
      checked: !s.codex_mcp.registered,
      disabled: false,
    },
    {
      key: 'unregister_codex_mcp',
      group: 'codex',
      label: 'Unregister Codex MCP',
      tag: 'Codex',
      desc: 'Remove srv from Codex MCP servers.',
      checked: false,
      disabled: !s.codex_mcp.registered,
    },
    {
      key: 'init_profile',
      group: 'profile',
      label: 'Run srv init in a new terminal',
      tag: 'Profile',
      desc: 'Open an interactive terminal to configure an SSH profile.',
      checked: s.profiles.count === 0,
      disabled: false,
    },
  ];
}

function renderStatus(s) {
  $('#subtitle').textContent = `srv ${s.binary.version || 'unknown'} on ${platformName(s.platform)}`;

  const complete =
    s.path.on_path &&
    s.codex_mcp.registered &&
    (!s.claude_mcp.available || s.claude_mcp.registered) &&
    s.profiles.count > 0;
  setOverall(complete ? 'ok' : 'warn', complete ? 'Ready' : 'Setup available');

  const claudeDetail = s.claude_mcp.available
    ? (s.claude_mcp.registered ? `scope: ${s.claude_mcp.scope || 'unknown'}` : 'Claude CLI found, srv not registered')
    : 'Claude CLI not found on PATH';
  const codexDetail = s.codex_mcp.registered
    ? (s.codex_mcp.command || 'registered')
    : `config: ${s.codex_mcp.config_path}`;
  const profileDetail = s.profiles.count > 0
    ? (s.profiles.default ? `default: ${s.profiles.default}` : 'profiles configured')
    : 'run init to create one';

  $('#status').replaceChildren(
    metric('Binary', s.binary.path, `version ${s.binary.version || 'unknown'}`, 'ok', 'found'),
    metric('PATH', s.path.dir, s.path.on_path ? 'available in new shells' : 'not available from PATH yet', s.path.on_path ? 'ok' : 'warn', s.path.on_path ? 'on PATH' : 'missing'),
    metric('Claude Code', s.claude_mcp.available ? 'claude CLI' : 'not detected', claudeDetail, statusKind(s.claude_mcp.registered, s.claude_mcp.available), s.claude_mcp.registered ? 'registered' : 'optional'),
    metric('Codex', s.codex_mcp.config_path || 'config', codexDetail, s.codex_mcp.registered ? 'ok' : 'warn', s.codex_mcp.registered ? 'registered' : 'missing'),
    metric('Profiles', `${s.profiles.count || 0} configured`, profileDetail, s.profiles.count > 0 ? 'ok' : 'warn', s.profiles.count > 0 ? 'ready' : 'needed')
  );
}

function renderActions(s) {
  const actions = buildActions(s);
  const container = $('#actions');
  container.replaceChildren();

  for (const action of actions) {
    const label = el('label', `action ${action.disabled ? 'disabled' : ''}`);
    const input = el('input');
    input.type = 'checkbox';
    input.dataset.action = action.key;
    input.dataset.group = action.group;
    input.checked = action.checked && !action.disabled;
    input.disabled = action.disabled;

    const body = el('div');
    const title = el('div', 'action-title');
    title.append(el('span', '', action.label), el('span', 'action-tag', action.tag));
    body.append(title, el('div', 'action-desc', action.desc));

    label.append(input, body);
    if (input.checked) label.classList.add('selected');
    container.append(label);
  }
  updateSelectedCount();
}

function updateSelectedCount() {
  const checked = [...document.querySelectorAll('input[data-action]:checked')];
  $('#selected-count').textContent = `${checked.length} selected`;
  $('#apply').disabled = checked.length === 0;
  for (const input of document.querySelectorAll('input[data-action]')) {
    input.closest('.action').classList.toggle('selected', input.checked);
  }
}

async function loadStatus() {
  setOverall('warn', 'Checking installation');
  const r = await fetch('/api/status');
  if (!r.ok) throw new Error(`status failed: ${r.status}`);
  const s = await r.json();
  renderStatus(s);
  renderActions(s);
}

function logLine(line) {
  const node = $('#log');
  const ts = new Date().toLocaleTimeString();
  node.textContent += `[${ts}] ${line}\n`;
  node.scrollTop = node.scrollHeight;
}

document.addEventListener('change', (event) => {
  const input = event.target;
  if (!input.matches('input[data-action]')) return;
  if (input.checked && input.dataset.group) {
    for (const other of document.querySelectorAll(`input[data-group="${input.dataset.group}"]`)) {
      if (other !== input) other.checked = false;
    }
  }
  updateSelectedCount();
});

$('#apply').addEventListener('click', async () => {
  const checked = [...document.querySelectorAll('input[data-action]:checked')]
    .map((node) => node.dataset.action);
  if (checked.length === 0) {
    logLine('Nothing selected.');
    return;
  }

  $('#apply').disabled = true;
  $('#refresh').disabled = true;
  setOverall('warn', 'Applying changes');
  logLine(`Applying: ${checked.join(', ')}`);
  try {
    const r = await fetch('/api/apply', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ actions: checked }),
    });
    if (!r.ok) throw new Error(`apply failed: ${r.status}`);
    const result = await r.json();
    for (const line of result.log || []) logLine(line);
    await loadStatus();
  } catch (err) {
    setOverall('bad', 'Action failed');
    logLine(`error: ${err.message || err}`);
  } finally {
    $('#refresh').disabled = false;
    updateSelectedCount();
  }
});

$('#refresh').addEventListener('click', async () => {
  $('#refresh').disabled = true;
  try {
    await loadStatus();
    logLine('Status refreshed.');
  } catch (err) {
    setOverall('bad', 'Refresh failed');
    logLine(`error: ${err.message || err}`);
  } finally {
    $('#refresh').disabled = false;
  }
});

$('#quit').addEventListener('click', async () => {
  try {
    await fetch('/api/quit', { method: 'POST' });
  } finally {
    document.body.innerHTML = `
      <div class="done">
        <h1>Done</h1>
        <p>You can close this tab.</p>
      </div>`;
  }
});

loadStatus().catch((err) => {
  setOverall('bad', 'Status unavailable');
  logLine(`error: ${err.message || err}`);
});
</script>
</body>
</html>
